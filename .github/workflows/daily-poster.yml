name: Daily Automotive Poster Generator

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm install

      - run: node index.js

      - uses: actions/upload-artifact@v4
        with:
          name: poster-output
          path: output.png
