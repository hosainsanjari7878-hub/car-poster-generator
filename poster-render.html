<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080" />
  <title>قیمت خودرو</title>
  <!-- CSS is injected inline by index.js at render time -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --navy-darkest:  #060B18;
  --navy-dark:     #0B1120;
  --navy-mid:      #101828;
  --navy-light:    #16213A;
  --navy-panel:    #1A2540;
  --gold-bright:   #F0C040;
  --gold-main:     #C9A840;
  --gold-muted:    #8B6F2A;
  --gold-dim:      #3D2F0E;
  --red-up:        #FF5252;
  --green-down:    #00C48C;
  --text-primary:  #EAE6D6;
  --text-secondary:#9A96A0;
  --text-faint:    #4A4860;
  --border-gold:   rgba(201,168,64,0.35);
  --border-faint:  rgba(255,255,255,0.06);
  --glow-gold:     rgba(201,168,64,0.18);
}

html, body {
  width: 1080px;
  height: 1080px;
  overflow: hidden;
  background: #060B18;
  font-family: 'Vazirmatn', sans-serif;
  direction: rtl;
  -webkit-font-smoothing: antialiased;
  color: #EAE6D6;
}

/* ─── CANVAS ─────────────────────────────────── */
.canvas {
  width: 1080px;
  height: 1080px;
  position: relative;
  background:
    radial-gradient(ellipse 70% 55% at 50% -5%, rgba(201,168,64,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 100% 100%, rgba(22,33,58,0.9) 0%, transparent 70%),
    linear-gradient(160deg, #0B1120 0%, #060B18 100%);
  display: flex;
  flex-direction: column;
  padding: 44px 50px 36px;
  gap: 0;
}

/* ─── CORNER ACCENTS ─────────────────────────── */
.canvas::before,
.canvas::after {
  content: '';
  position: absolute;
  width: 110px;
  height: 110px;
  pointer-events: none;
}
.canvas::before {
  top: 26px; right: 36px;
  border-top: 2px solid #C9A840;
  border-right: 2px solid #C9A840;
}
.canvas::after {
  bottom: 26px; left: 36px;
  border-bottom: 2px solid #C9A840;
  border-left: 2px solid #C9A840;
}

/* ─── HEADER ─────────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 22px;
}

.header-logo {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 2px;
}

.logo-title {
  font-size: 26px;
  font-weight: 900;
  letter-spacing: 0.04em;
  background: linear-gradient(90deg, #C9A840, #F0C040);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}

.logo-sub {
  font-size: 11px;
  font-weight: 400;
  color: #9A96A0;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  direction: ltr;
}

.header-date-block {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 4px;
}

.date-label {
  font-size: 10px;
  font-weight: 500;
  color: #4A4860;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.date-value {
  font-size: 22px;
  font-weight: 700;
  color: #F0C040;
  direction: rtl;
  line-height: 1;
}

.date-day {
  font-size: 13px;
  font-weight: 400;
  color: #9A96A0;
}

/* ─── DIVIDER ────────────────────────────────── */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, #8B6F2A, #C9A840, #8B6F2A, transparent);
  margin-bottom: 22px;
  opacity: 0.7;
}

/* ─── BODY GRID ──────────────────────────────── */
.body-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px;
  flex: 1;
}

/* ─── PANEL ──────────────────────────────────── */
.panel {
  background: #1A2540;
  border: 1px solid rgba(201,168,64,0.35);
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.06) inset,
    0 8px 32px rgba(0,0,0,0.5),
    0 0 40px rgba(201,168,64,0.18);
}

.panel-header {
  padding: 14px 18px 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(135deg, rgba(201,168,64,0.14) 0%, rgba(201,168,64,0.04) 100%);
  border-bottom: 1px solid rgba(201,168,64,0.35);
  position: relative;
}

.panel-header::after {
  content: '';
  position: absolute;
  bottom: 0; right: 0; left: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, #8B6F2A, transparent);
}

.panel-badge {
  width: 6px;
  height: 36px;
  border-radius: 3px;
  background: linear-gradient(180deg, #F0C040, #8B6F2A);
  flex-shrink: 0;
}

.panel-title {
  font-size: 17px;
  font-weight: 800;
  color: #F0C040;
  line-height: 1.2;
  letter-spacing: 0.01em;
}

.panel-title-en {
  font-size: 10px;
  font-weight: 400;
  color: #4A4860;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  direction: ltr;
  margin-top: 1px;
}

/* ─── TABLE ──────────────────────────────────── */
.price-table {
  width: 100%;
  border-collapse: collapse;
  flex: 1;
  direction: rtl;
}

.price-table thead tr {
  background: rgba(201,168,64,0.07);
}

.price-table thead th {
  padding: 9px 14px;
  font-size: 10px;
  font-weight: 600;
  color: #8B6F2A;
  letter-spacing: 0.06em;
  text-align: right;
  text-transform: uppercase;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.price-table thead th.col-price,
.price-table thead th.col-change {
  text-align: center;
}

.price-table tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.06);
  transition: background 0.15s;
}

.price-table tbody tr:nth-child(even) {
  background: rgba(255,255,255,0.022);
}

.price-table tbody tr:last-child {
  border-bottom: none;
}

.price-table tbody td {
  padding: 9px 14px;
  vertical-align: middle;
}

.td-model {
  text-align: right;
}

.model-name {
  font-size: 13.5px;
  font-weight: 700;
  color: #EAE6D6;
  line-height: 1.2;
  white-space: nowrap;
}

.model-trim {
  font-size: 10px;
  font-weight: 400;
  color: #4A4860;
  margin-top: 2px;
  white-space: nowrap;
}

.td-price {
  text-align: center;
}

.price-value {
  font-size: 14.5px;
  font-weight: 800;
  color: #F0C040;
  letter-spacing: 0.02em;
  white-space: nowrap;
}

.price-unit {
  font-size: 9px;
  font-weight: 400;
  color: #8B6F2A;
  display: block;
  margin-top: 1px;
}

.td-change {
  text-align: center;
}

.change-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 2px;
  padding: 3px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  white-space: nowrap;
  min-width: 44px;
}

.change-up {
  background: rgba(255,82,82,0.12);
  color: #FF5252;
  border: 1px solid rgba(255,82,82,0.22);
}

.change-down {
  background: rgba(0,196,140,0.10);
  color: #00C48C;
  border: 1px solid rgba(0,196,140,0.20);
}

.change-flat {
  background: rgba(255,255,255,0.05);
  color: #4A4860;
  border: 1px solid rgba(255,255,255,0.08);
}

/* ─── FOOTER ─────────────────────────────────── */
.footer {
  margin-top: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.footer-note {
  font-size: 10px;
  font-weight: 400;
  color: #4A4860;
  letter-spacing: 0.04em;
}

.footer-handle {
  font-size: 11px;
  font-weight: 600;
  color: #8B6F2A;
  letter-spacing: 0.06em;
  direction: ltr;
}

.footer-dots {
  display: flex;
  gap: 5px;
  align-items: center;
}

.footer-dots span {
  display: block;
  border-radius: 50%;
}

.footer-dots span:nth-child(1) { width: 6px; height: 6px; background: #C9A840; }
.footer-dots span:nth-child(2) { width: 4px; height: 4px; background: #8B6F2A; opacity: 0.7; }
.footer-dots span:nth-child(3) { width: 3px; height: 3px; background: #3D2F0E; opacity: 0.5; }

</style>
</head>
<body>
  <div class="canvas">

    <!-- ── HEADER ── -->
    <div class="header">
      <div class="header-date-block">
        <span class="date-label">بروزرسانی</span>
        <span class="date-value">{{DATE}}</span>
        <span class="date-day">{{DAY_NAME}}</span>
      </div>

      <div class="header-logo">
        <span class="logo-title">قیمت خودرو</span>
        <span class="logo-sub">AUTO PRICE BOARD</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- ── TABLES GRID ── -->
    <div class="body-grid">

      <!-- SAIPA PANEL -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-badge"></div>
          <div>
            <div class="panel-title">سایپا</div>
            <div class="panel-title-en">SAIPA GROUP</div>
          </div>
        </div>
        <table class="price-table">
          <thead>
            <tr>
              <th>مدل</th>
              <th class="col-price">قیمت (م.ت)</th>
              <th class="col-change">تغییر</th>
            </tr>
          </thead>
          <tbody>
            {{SAIPA_ROWS}}
          </tbody>
        </table>
      </div>

      <!-- IRAN KHODRO PANEL -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-badge"></div>
          <div>
            <div class="panel-title">ایران خودرو</div>
            <div class="panel-title-en">IRAN KHODRO</div>
          </div>
        </div>
        <table class="price-table">
          <thead>
            <tr>
              <th>مدل</th>
              <th class="col-price">قیمت (م.ت)</th>
              <th class="col-change">تغییر</th>
            </tr>
          </thead>
          <tbody>
            {{IKCO_ROWS}}
          </tbody>
        </table>
      </div>

    </div><!-- /body-grid -->

    <!-- ── FOOTER ── -->
    <div class="footer">
      <span class="footer-note">قیمت‌ها بر اساس بازار آزاد — میلیون تومان</span>
      <div class="footer-dots">
        <span></span><span></span><span></span>
      </div>
      <span class="footer-handle">@autopriceboard</span>
    </div>

  </div><!-- /canvas -->
</body>
</html>
